<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>P&aacute;gina no encontrada &middot; VTACORA</title>
    <meta
      name="description"
      content="La p&aacute;gina que buscas no existe o fue movida."
    />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <meta name="theme-color" content="#0A0E14" />
    <meta name="color-scheme" content="dark" />
    <style>
      .nf {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 62vh;
        padding: var(--s5) var(--s3);
        gap: var(--s2);
      }
      .nf__code {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: clamp(6rem, 22vw, 12rem);
        line-height: 1;
        letter-spacing: -0.04em;
        color: transparent;
        -webkit-text-stroke: 1.5px rgba(200, 147, 58, 0.4);
        user-select: none;
        margin: 0;
      }
      .nf__title {
        font-family: var(--font-display);
        font-size: clamp(1.4rem, 4vw, 2rem);
        font-weight: 600;
        color: var(--cream);
        margin: 0;
      }
      .nf__sub {
        color: var(--cream-3);
        max-width: 30rem;
        margin: 0;
      }
      .nf__actions {
        display: flex;
        gap: var(--s2);
        flex-wrap: wrap;
        justify-content: center;
        margin-top: var(--s3);
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <a class="skip-link" href="#main-contenido"
      >Saltar al contenido principal</a
    >
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="index.html">
          <span class="brand__seal"
            ><img src="assets/img/logo.svg" alt="" width="34" height="34"
          /></span>
          <span class="brand__name">VTACORA</span>
        </a>
        <button
          class="nav-toggle"
          aria-expanded="false"
          aria-label="Abrir men&uacute;"
        >
          <span></span><span></span><span></span>
        </button>
        <nav class="nav">
          <a class="nav__link" href="index.html">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M3 11.5 12 4l9 7.5" />
              <path
                d="M5.5 10v9a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1v-9"
              />
            </svg>
            Inicio
          </a>
          <a class="nav__link" href="repositorio.html">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect x="3" y="7" width="18" height="13" rx="1.2" />
              <path d="M3 7 5 3h14l2 4" />
              <path d="M10 12h4" />
            </svg>
            Repositorio
          </a>
        </nav>
        <div
          id="nav-auth-slot"
          style="flex-shrink: 0; display: flex; align-items: center"
        ></div>
      </div>
    </header>

    <main id="main-contenido" tabindex="-1">
      <div class="nf">
        <p class="nf__code" aria-hidden="true">404</p>
        <h1 class="nf__title">Esta p&aacute;gina no existe</h1>
        <p class="nf__sub">
          El enlace puede estar incompleto, o la entrada fue movida o
          eliminada. Prueba desde el inicio o busca en el repositorio.
        </p>
        <div class="nf__actions">
          <a class="btn btn--primary" href="index.html">Ir al inicio</a>
          <a class="btn btn--ghost" href="repositorio.html"
            >Ver el repositorio</a
          >
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <span
          >VTACORA &copy; <span id="anio-actual"></span> &middot; Hecho a
          mano</span
        >
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/three-bg.js"></script>
  </body>
</html>
