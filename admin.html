<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin &middot; VTACORA</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#0A0E14" />
    <meta name="color-scheme" content="dark" />
    <style>
      /* ---- Admin-only styles ---- */
      .adm-wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: var(--s4) var(--s3) var(--s7);
      }
      .adm-login {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        gap: var(--s3);
        text-align: center;
      }
      .adm-login__title {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 600;
        color: var(--cream);
      }
      .adm-login__sub {
        color: var(--cream-3);
        font-size: 0.95rem;
      }

      .adm-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--s2);
        margin-bottom: var(--s5);
        padding-bottom: var(--s3);
        border-bottom: 1px solid var(--rim);
      }
      .adm-header__user {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--cream-3);
        letter-spacing: 0.05em;
      }

      /* Barra "Entradas / Nueva entrada" */
      .adm-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s2);
        margin-bottom: var(--s3);
        flex-wrap: wrap;
      }
      .adm-header__session {
        display: flex;
        align-items: center;
        gap: var(--s3);
        min-width: 0;
      }

      /* Lista de entradas (reemplaza la tabla: funciona igual de bien
         en escritorio y en móvil, donde una tabla de 6 columnas desborda) */
      .adm-list {
        display: flex;
        flex-direction: column;
        gap: 1px;
        background: var(--rim);
        border: 1px solid var(--rim);
      }
      .adm-item {
        background: var(--void-2);
        padding: var(--s2) var(--s3);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s3);
        transition: background 0.15s;
      }
      .adm-item:hover {
        background: var(--void-3);
      }
      .adm-item__main {
        min-width: 0;
        flex: 1;
      }
      .adm-item__title {
        margin: 0 0 0.35rem;
        color: var(--cream);
        font-weight: 500;
        font-size: 0.95rem;
        line-height: 1.35;
        overflow-wrap: break-word;
      }
      .adm-item__sub {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.35rem 0.9rem;
        font-family: var(--font-mono);
        font-size: 0.68rem;
        color: var(--cream-3);
        letter-spacing: 0.04em;
      }
      .adm-item__id {
        color: var(--signal);
      }
      .adm-item__tema {
        color: var(--gold-dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .tag-pub {
        color: var(--gold);
      }
      .adm-item__actions {
        display: flex;
        gap: 0.5rem;
        flex-shrink: 0;
      }
      .adm-item__actions button {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.45rem 0.85rem;
        min-height: 36px;
        border: 1px solid var(--rim);
        border-radius: 1px;
        transition: all 0.15s;
        cursor: pointer;
        color: var(--cream-3);
        background: none;
      }
      .adm-item__actions button:hover {
        border-color: var(--gold);
        color: var(--cream);
      }
      .adm-item__actions button.del:hover {
        border-color: var(--signal);
        color: var(--signal);
      }

      /* Formulario */
      .adm-form {
        background: var(--void-2);
        border: 1px solid var(--rim);
        border-top: 2px solid var(--gold);
        padding: var(--s4);
        margin-top: var(--s4);
      }
      .adm-form__title {
        font-family: var(--font-display);
        font-size: 1.4rem;
        font-weight: 600;
        color: var(--cream);
        margin: 0 0 var(--s4);
      }
      .adm-form__grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--s3);
      }
      .adm-form__full {
        grid-column: 1 / -1;
      }
      .adm-field {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .adm-label {
        font-family: var(--font-mono);
        font-size: 0.68rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--gold-dim);
      }
      .adm-input,
      .adm-select,
      .adm-textarea {
        background: var(--void-3);
        border: 1px solid var(--rim);
        color: var(--cream);
        font-family: var(--font-body);
        font-size: 0.95rem;
        padding: 0.6rem 0.85rem;
        border-radius: 1px;
        transition: border-color 0.15s;
        width: 100%;
        box-sizing: border-box;
      }
      .adm-input:focus,
      .adm-select:focus,
      .adm-textarea:focus {
        outline: none;
        border-color: var(--gold);
      }
      .adm-textarea {
        font-family: var(--font-mono);
        font-size: 0.82rem;
        min-height: 260px;
        resize: vertical;
        line-height: 1.6;
      }
      .adm-select option {
        background: var(--void-3);
      }
      .adm-form__actions {
        display: flex;
        gap: var(--s2);
        margin-top: var(--s4);
        flex-wrap: wrap;
        align-items: center;
      }
      .adm-msg {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        padding: 0.5rem 1rem;
        border-radius: 1px;
      }
      .adm-msg--ok {
        background: rgba(200, 147, 58, 0.15);
        color: var(--gold);
      }
      .adm-msg--err {
        background: rgba(224, 90, 43, 0.15);
        color: var(--signal);
      }

      .adm-empty {
        color: var(--cream-3);
        font-style: italic;
        padding: var(--s4) 0;
        text-align: center;
      }
      .adm-loading {
        color: var(--cream-3);
        padding: var(--s4) 0;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        letter-spacing: 0.08em;
      }

      .tag-draft {
        display: inline-block;
        font-family: var(--font-mono);
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.15rem 0.5rem;
        border: 1px solid var(--rim-2);
        color: var(--cream-3);
        border-radius: 1px;
      }

      @media (max-width: 600px) {
        .adm-wrap {
          padding: var(--s3) var(--s2) var(--s6);
        }
        .adm-form__grid {
          grid-template-columns: 1fr;
        }
        .adm-form {
          padding: var(--s3) var(--s2);
        }
        .adm-form__actions {
          flex-direction: column;
          align-items: stretch;
        }
        .adm-form__actions .btn {
          width: 100%;
          justify-content: center;
        }
        .adm-msg {
          text-align: center;
        }
        /* Con menos de 16px iOS hace zoom automático al enfocar un campo */
        .adm-input,
        .adm-select,
        .adm-textarea {
          font-size: 1rem;
        }
        .adm-textarea {
          min-height: 200px;
        }
        .adm-header {
          flex-direction: column;
          align-items: flex-start;
        }
        .adm-header__session {
          width: 100%;
          justify-content: space-between;
        }
        .adm-header__user {
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          min-width: 0;
        }
        .adm-toolbar .btn {
          width: 100%;
          justify-content: center;
        }
        .adm-item {
          flex-direction: column;
          align-items: stretch;
          gap: var(--s2);
        }
        .adm-item__actions button {
          flex: 1;
          padding: 0.7rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <a class="skip-link" href="#main-contenido"

    >
    <header class="site-header">
      <div class="container site-header__inner">
        <a class="brand" href="index.html">

              />
            </svg>
            Inicio

          <a class="nav__link" href="repositorio.html">
            <svg
              viewBox="0 0 24 24"

            >
              <rect x="3" y="7" width="18" height="13" rx="1.2" />

          <a class="nav__link" href="admin.html" aria-current="page">

    <main id="main-contenido" tabindex="-1">
      <div class="adm-wrap">
        <!-- Estado: cargando -->
        <div id="adm-loading" class="adm-loading">Verificando sesión…</div>

        <!-- Estado: no autenticado -->
        <div id="adm-login" class="adm-login" hidden>
          <p class="adm-login__title">Acceso restringido</p>
          <p class="adm-login__sub">
            Inicia sesión con tu cuenta de Google para acceder al panel.
          </p>
          <button class="btn btn--primary" id="btn-google">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4"
              />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853"
              />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                fill="#FBBC05"
              />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335"
              />
            </svg>
            Continuar con Google
          </button>
        </div>

        <!-- Estado: autenticado pero no es admin -->
        <div
          id="adm-forbidden"
          hidden
          style="text-align: center; padding: var(--s7) 0"
        >
          <p class="display-2" style="margin-bottom: var(--s3)">
            Acceso denegado
          </p>
          <p
            class="lead"
            style="color: var(--cream-3); margin-bottom: var(--s4)"
          >
            Tu cuenta no tiene permisos de administrador.
          </p>
          <button class="btn btn--ghost" id="btn-logout-forbidden">
            Cerrar sesión
          </button>
        </div>

        <!-- Estado: autenticado y es admin -->
        <div id="adm-panel" hidden>
          <div class="adm-header">
            <h1 class="display-2">Panel Admin</h1>
            <div class="adm-header__session">
              <span class="adm-header__user" id="adm-user-email"></span>
              <button
                class="btn btn--ghost"
                id="btn-logout"
                style="padding: 0.5rem 1rem; font-size: 0.7rem"
              >
                Cerrar sesión
              </button>
            </div>
          </div>

          <!-- Lista de entradas -->
          <div class="adm-toolbar">
            <span class="eyebrow">— Entradas</span>
            <button
              class="btn btn--primary"
              id="btn-nueva"
              style="padding: 0.55rem 1.1rem; font-size: 0.72rem"
            >
              + Nueva entrada
            </button>
          </div>

          <div id="adm-tabla-wrap">
            <p class="adm-loading">Cargando entradas…</p>
          </div>

          <!-- Formulario crear / editar -->
          <div id="adm-form-wrap" hidden>
            <div class="adm-form">
              <p class="adm-form__title" id="adm-form-titulo">Nueva entrada</p>
              <div class="adm-form__grid">
                <div class="adm-field">
                  <label class="adm-label" for="f-id">ID (ej. "0003")</label>
                  <input
                    class="adm-input"
                    type="text"
                    id="f-id"
                    placeholder="0003"
                    maxlength="10"
                  />
                </div>

                <div class="adm-field">
                  <label class="adm-label" for="f-fecha">Fecha</label>
                  <input class="adm-input" type="date" id="f-fecha" />
                </div>

                <div class="adm-field">
                  <label class="adm-label" for="f-tema">Tema</label>
                  <select class="adm-select" id="f-tema">
                    <option value="">— elige —</option>
                  </select>
                </div>

                <div class="adm-field">
                  <label class="adm-label" for="f-publicado">Estado</label>
                  <select class="adm-select" id="f-publicado">
                    <option value="true">Publicado</option>
                    <option value="false">Borrador</option>
                  </select>
                </div>

                <div class="adm-field adm-form__full">
                  <label class="adm-label" for="f-titulo">Título</label>
                  <input
                    class="adm-input"
                    type="text"
                    id="f-titulo"
                    placeholder="Título de la entrada"
                  />
                </div>

                <div class="adm-field adm-form__full">
                  <label class="adm-label" for="f-resumen"
                    >Resumen (para tarjetas)</label
                  >
                  <input
                    class="adm-input"
                    type="text"
                    id="f-resumen"
                    placeholder="1-2 frases cortas"
                  />
                </div>

                <div class="adm-field">
                  <label class="adm-label" for="f-imagen"
                    >URL imagen de portada (opcional)</label
                  >
                  <input
                    class="adm-input"
                    type="url"
                    id="f-imagen"
                    placeholder="https://…"
                  />
                </div>

                <div class="adm-field">
                  <label class="adm-label" for="f-imagen-alt"
                    >Alt de la imagen</label
                  >
                  <input
                    class="adm-input"
                    type="text"
                    id="f-imagen-alt"
                    placeholder="Descripción breve"
                  />
                </div>

                <div class="adm-field adm-form__full">
                  <label class="adm-label" for="f-contenido">
                    Contenido HTML
                    <span
                      style="
                        opacity: 0.5;
                        font-size: 0.85em;
                        margin-left: 0.5em;
                      "
                      >(puedes usar &lt;p&gt;, &lt;h2&gt;, &lt;ul&gt;,
                      &lt;blockquote&gt;…)</span
                    >
                  </label>
                  <textarea
                    class="adm-textarea"
                    id="f-contenido"
                    placeholder="<p>Primer párrafo...</p>"
                  ></textarea>
                </div>
              </div>
              <!-- /.adm-form__grid -->

              <div class="adm-form__actions">
                <button class="btn btn--primary" id="btn-guardar">
                  Guardar entrada
                </button>
                <button class="btn btn--ghost" id="btn-cancelar">
                  Cancelar
                </button>
                <span id="adm-form-msg" class="adm-msg" hidden></span>
              </div>
            </div>
          </div>
          <!-- /#adm-form-wrap -->
        </div>
        <!-- /#adm-panel -->
      </div>
      <!-- /.adm-wrap -->
    </main>

    <footer class="site-footer">
      <div class="container site-footer__inner">
        <span>VTACORA &copy; <span id="anio-actual"></span></span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/three-bg.js"></script>
    <script>
      /* =========================================================================
   VTACORA Admin — panel de gestión
   ========================================================================= */

      const ADMIN_EMAIL = "escobarpupoyancarlos1@gmail.com";

      const $ = (id) => document.getElementById(id);
      const show = (id) => ($(id).hidden = false);
      const hide = (id) => ($(id).hidden = true);

      let entradas = [];
      let temas = [];
      let editandoId = null;

      /* =========================================================
   ARRANQUE
   ========================================================= */
      async function init() {
        const user = await getUser();
        hide("adm-loading");
        if (!user) {
          show("adm-login");
          return;
        }
        if (user.email !== ADMIN_EMAIL) {
          show("adm-forbidden");
          return;
        }
        $("adm-user-email").textContent = user.email;
        show("adm-panel");
        await cargarTemas();
        await cargarEntradas();
      }

      /* =========================================================
   AUTH
   ========================================================= */
      $("btn-google").addEventListener("click", () => signInWithGoogle());
      $("btn-logout").addEventListener("click", async () => {
        await sbSignOut();
        location.reload();
      });
      $("btn-logout-forbidden").addEventListener("click", async () => {
        await sbSignOut();
        location.reload();
      });

      // Guardado: si el CDN de Supabase no cargó, el resto de la página
      // (hamburguesa, sombra del header, año del footer) debe seguir vivo.
      if (window._sb) {
        _sb.auth.onAuthStateChange(function (_event, session) {
          renderNavAuth();
          if (session) init();
        });
      }

      /* =========================================================
   NAV AUTH — avatar/login en el nav (igual que en el resto del sitio)
   ========================================================= */
      function renderNavAuth() {
        const slot = document.getElementById("nav-auth-slot");
        if (!slot) return;
        getUser()
          .then((user) => {
            if (!user) {
              slot.innerHTML =
                '<button class="nav-auth-btn nav-auth-btn--login" id="nav-btn-login" title="Iniciar sesión con Google">' +
                '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>' +
                '<span class="nav-auth-btn__label">Iniciar sesión</span>' +
                "</button>";
              const btn = document.getElementById("nav-btn-login");
              if (btn)
                btn.addEventListener("click", () =>
                  signInWithGoogle().catch((e) => console.error(e)),
                );
              return;
            }

            const meta = user.user_metadata || {};
            const avatar = meta.avatar_url || meta.picture;
            const nombre = meta.full_name || meta.name || user.email;
            const esAdmin = user.email === ADMIN_EMAIL;

            const avatarHTML = avatar
              ? `<img class="nav-auth-avatar__img" src="${avatar}" alt="${nombre}">`
              : `<span class="nav-auth-avatar__initials">${nombre.charAt(0).toUpperCase()}</span>`;

            slot.innerHTML =
              '<div class="nav-auth-user" id="nav-auth-user">' +
              '<button class="nav-auth-avatar" id="nav-auth-toggle" aria-expanded="false" aria-label="Menú de cuenta" title="' +
              nombre +
              '">' +
              '<span class="nav-auth-avatar__wrap">' +
              avatarHTML +
              "</span>" +
              (esAdmin
                ? '<span class="nav-auth-badge" title="Admin">A</span>'
                : "") +
              "</button>" +
              '<div class="nav-auth-dropdown" id="nav-auth-dropdown" hidden>' +
              '<div class="nav-auth-dropdown__info">' +
              '<span class="nav-auth-dropdown__name">' +
              nombre +
              "</span>" +
              '<span class="nav-auth-dropdown__email">' +
              user.email +
              "</span>" +
              (esAdmin
                ? '<span class="nav-auth-dropdown__role">Administrador</span>'
                : "") +
              "</div>" +
              '<button class="nav-auth-dropdown__item nav-auth-dropdown__item--danger" id="nav-btn-logout-dd"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión</button>' +
              "</div>" +
              "</div>";

            const toggleBtn = document.getElementById("nav-auth-toggle");
            const dropdown = document.getElementById("nav-auth-dropdown");
            if (toggleBtn && dropdown) {
              toggleBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                const wasHidden = dropdown.hidden;
                dropdown.hidden = !wasHidden;
                toggleBtn.setAttribute(
                  "aria-expanded",
                  wasHidden ? "true" : "false",
                );
              });
              document.addEventListener("click", (e) => {
                const wrap = document.getElementById("nav-auth-user");
                if (wrap && !wrap.contains(e.target)) {
                  dropdown.hidden = true;
                  toggleBtn.setAttribute("aria-expanded", "false");
                }
              });
              document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && !dropdown.hidden) {
                  dropdown.hidden = true;
                  toggleBtn.setAttribute("aria-expanded", "false");
                  toggleBtn.focus();
                }
              });
            }

            const logoutBtn = document.getElementById("nav-btn-logout-dd");
            if (logoutBtn)
              logoutBtn.addEventListener("click", async () => {
                await sbSignOut();
                location.reload();
              });
          })
          .catch((err) => console.error("NavAuth error:", err));
      }

      if (window._sb) renderNavAuth();

      /* =========================================================
   TEMAS
   ========================================================= */
      async function cargarTemas() {
        try {
          temas = await fetchTemas();
          const sel = $("f-tema");
          sel.innerHTML =
            '<option value="">— elige —</option>' +
            temas
              .map((t) => `<option value="${t.slug}">${t.label}</option>`)
              .join("");
        } catch (e) {
          console.error("Error cargando temas", e);
        }
      }

      /* =========================================================
   ENTRADAS
   ========================================================= */
      async function cargarEntradas() {
        $("adm-tabla-wrap").innerHTML =
          '<p class="adm-loading">Cargando entradas…</p>';
        try {
          // admin ve todas (publicadas y borradores)
          const { data, error } = await _sb
            .from("entradas")
            .select("id, fecha, tema, titulo, publicado")
            .order("fecha", { ascending: false });
          if (error) throw error;
          entradas = data;
          pintarTabla();
        } catch (e) {
          $("adm-tabla-wrap").innerHTML =
            `<p class="adm-msg adm-msg--err">Error: ${e.message}</p>`;
        }
      }

      function pintarTabla() {
        if (!entradas.length) {
          $("adm-tabla-wrap").innerHTML =
            '<p class="adm-empty">No hay entradas todavía.</p>';
          return;
        }
        $("adm-tabla-wrap").innerHTML =
          '<div class="adm-list">' +
          entradas
            .map(
              (e) => `
        <article class="adm-item">
          <div class="adm-item__main">
            <p class="adm-item__title">${e.titulo}</p>
            <div class="adm-item__sub">
              <span class="adm-item__id">Nº ${e.id}</span>
              <span>${e.fecha}</span>
              <span class="adm-item__tema">${e.tema}</span>
              ${
                e.publicado
                  ? '<span class="tag-pub">✓ Publicado</span>'
                  : '<span class="tag-draft">Borrador</span>'
              }
            </div>
          </div>
          <div class="adm-item__actions">
            <button data-id="${e.id}" class="btn-editar">Editar</button>
            <button data-id="${e.id}" class="btn-del del">Borrar</button>
          </div>
        </article>`,
            )
            .join("") +
          "</div>";

        $("adm-tabla-wrap")
          .querySelectorAll(".btn-editar")
          .forEach((b) =>
            b.addEventListener("click", () => abrirEditar(b.dataset.id)),
          );
        $("adm-tabla-wrap")
          .querySelectorAll(".btn-del")
          .forEach((b) =>
            b.addEventListener("click", () => confirmarBorrar(b.dataset.id)),
          );
      }

      /* =========================================================
   FORMULARIO
   ========================================================= */
      $("btn-nueva").addEventListener("click", () => abrirNueva());

      function abrirNueva() {
        editandoId = null;
        $("adm-form-titulo").textContent = "Nueva entrada";
        $("f-id").disabled = false;
        limpiarForm();
        $("f-fecha").value = new Date().toISOString().slice(0, 10);
        show("adm-form-wrap");
        $("adm-form-wrap").scrollIntoView({
          behavior: "smooth",
          block: "start",
        });
      }

      async function abrirEditar(id) {
        editandoId = id;
        $("adm-form-titulo").textContent = "Editar entrada";
        $("f-id").disabled = true;
        try {
          const { data, error } = await _sb
            .from("entradas")
            .select("*")
            .eq("id", id)
            .single();
          if (error) throw error;
          $("f-id").value = data.id;
          $("f-fecha").value = data.fecha;
          $("f-tema").value = data.tema;
          $("f-titulo").value = data.titulo;
          $("f-resumen").value = data.resumen;
          $("f-imagen").value = data.imagen || "";
          $("f-imagen-alt").value = data.imagen_alt || "";
          $("f-contenido").value = data.contenido_html;
          $("f-publicado").value = String(data.publicado);
          show("adm-form-wrap");
          $("adm-form-wrap").scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        } catch (e) {
          alert("No se pudo cargar la entrada: " + e.message);
        }
      }

      $("btn-cancelar").addEventListener("click", () => {
        hide("adm-form-wrap");
        limpiarForm();
      });

      function limpiarForm() {
        [
          "f-id",
          "f-fecha",
          "f-titulo",
          "f-resumen",
          "f-imagen",
          "f-imagen-alt",
          "f-contenido",
        ].forEach((id) => {
          $(id).value = "";
          $(id).disabled = false;
        });
        $("f-tema").value = "";
        $("f-publicado").value = "true";
        ocultarMsg();
      }

      $("btn-guardar").addEventListener("click", async () => {
        ocultarMsg();
        const id = $("f-id").value.trim();
        const fecha = $("f-fecha").value;
        const tema = $("f-tema").value;
        const titulo = $("f-titulo").value.trim();
        const resumen = $("f-resumen").value.trim();
        if (!id || !fecha || !tema || !titulo || !resumen) {
          mostrarMsg(
            "Completa los campos obligatorios: ID, fecha, tema, título y resumen.",
            "err",
          );
          return;
        }
        const entrada = {
          id,
          fecha,
          tema,
          titulo,
          resumen,
          imagen: $("f-imagen").value.trim() || null,
          imagen_alt: $("f-imagen-alt").value.trim() || null,
          contenido_html: $("f-contenido").value,
          publicado: $("f-publicado").value === "true",
        };
        $("btn-guardar").disabled = true;
        $("btn-guardar").textContent = "Guardando…";
        try {
          await upsertEntrada(entrada);
          mostrarMsg("✓ Entrada guardada correctamente.", "ok");
          await cargarEntradas();
          setTimeout(() => {
            hide("adm-form-wrap");
            limpiarForm();
          }, 1200);
        } catch (e) {
          mostrarMsg("Error: " + e.message, "err");
        } finally {
          $("btn-guardar").disabled = false;
          $("btn-guardar").textContent = "Guardar entrada";
        }
      });

      async function confirmarBorrar(id) {
        const e = entradas.find((x) => x.id === id);
        if (
          !confirm(
            `¿Borrar "${e?.titulo || id}"?\nEsta acción no se puede deshacer.`,
          )
        )
          return;
        try {
          await deleteEntrada(id);
          await cargarEntradas();
        } catch (e) {
          alert("Error al borrar: " + e.message);
        }
      }

      function mostrarMsg(texto, tipo) {
        const el = $("adm-form-msg");
        el.textContent = texto;
        el.className = "adm-msg adm-msg--" + tipo;
        el.hidden = false;
      }
      function ocultarMsg() {
        $("adm-form-msg").hidden = true;
      }

      // hamburguesa + sombra del header al hacer scroll
      (function () {
        const header = document.querySelector(".site-header");
        if (header) {
          const actualizarSombra = () =>
            header.classList.toggle("is-scrolled", (window.scrollY || 0) > 10);
          window.addEventListener("scroll", actualizarSombra, {
            passive: true,
          });
          actualizarSombra();
        }
        const toggle = document.querySelector(".nav-toggle");
        const nav = document.querySelector(".nav");
        if (!toggle || !nav) return;
        function setOpen(open) {
          nav.classList.toggle("is-open", open);
          toggle.setAttribute("aria-expanded", open ? "true" : "false");
        }
        toggle.addEventListener("click", () =>
          setOpen(!nav.classList.contains("is-open")),
        );
        document.addEventListener("click", (e) => {
          if (!nav.classList.contains("is-open")) return;
          if (nav.contains(e.target) || toggle.contains(e.target)) return;
          setOpen(false);
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && nav.classList.contains("is-open")) {
            setOpen(false);
            toggle.focus();
          }
        });
      })();

      document.getElementById("anio-actual").textContent =
        new Date().getFullYear();

      if (window._sb) {
        init();
      } else {
        $("adm-loading").textContent =
          "No se pudo conectar con el servidor. Recarga la página.";
      }
    </script>
  </body>
</html>
