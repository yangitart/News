<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repositorio &middot; VitaCora</title>
<meta name="description" content="Repositorio completo de entradas de VitaCora, filtrable por tema y por fecha.">
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;0,600;1,500&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="texture">

<header class="site-header">
  <div class="container site-header__inner">
    <a class="brand" href="index.html">
      <span class="brand__seal"><img src="assets/img/favicon.svg" alt="" width="34" height="34"></span>
      VitaCora
      <span class="brand__tag">&middot; bit&aacute;cora personal</span>
    </a>
    <button class="nav-toggle" aria-expanded="false" aria-label="Abrir men&uacute;">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav">
      <a class="nav__link" href="index.html">Inicio</a>
      <a class="nav__link" href="repositorio.html" aria-current="page">Repositorio</a>
    </nav>
  </div>
</header>

<main>
  <section class="section" style="padding-bottom:0">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow section-head__eyebrow">Archivo completo</span>
          <h1 class="display-2">Repositorio</h1>
        </div>
      </div>
      <p class="lead" style="margin-bottom:2rem">Filtra por tema, por mes o busca por palabra clave. Los filtros se
      pueden combinar entre s&iacute;.</p>

      <div class="repo-toolbar">
        <label class="repo-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="repo-search-input" placeholder="Buscar por palabra clave&hellip;" aria-label="Buscar entradas">
        </label>
        <div class="chips" id="repo-chips" role="group" aria-label="Filtrar por tema">
          <!-- chips generados desde data.js -->
        </div>
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:1rem">
    <div class="container repo-layout">
      <aside aria-label="Filtrar por fecha">
        <div class="repo-timeline" id="repo-timeline">
          <!-- l&iacute;nea de tiempo generada desde data.js -->
        </div>
      </aside>
      <div>
        <p class="repo-results__count" id="repo-count"></p>
        <div id="repo-results"></div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container site-footer__inner">
    <span>VitaCora &copy; <span id="anio-actual"></span></span>
    <span>Hecho con HTML, CSS y JS &mdash; sin frameworks</span>
  </div>
</footer>

<script src="assets/js/data.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
