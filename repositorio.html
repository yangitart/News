    <main id="main-contenido" tabindex="-1">
      <noscript>
        <div class="container" style="padding-top: var(--s4)">
          <p class="lead">
            Este sitio necesita JavaScript para mostrar las entradas. Activa
            JavaScript en tu navegador para verlo correctamente.
          </p>
        </div>
      </noscript>
      <section class="section" style="padding-bottom: 0">
        <div class="container">
          <h1 class="display-2" style="margin-bottom: var(--s3)">
            Repositorio
          </h1>
          <p class="lead" style="margin-bottom: var(--s4)">
            Filtra por tema, por mes o busca por palabra clave. Los filtros se
            pueden combinar.
          </p>

          <div class="repo-toolbar">
            <label class="repo-search">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                aria-hidden="true"
              >
                <circle cx="11" cy="11" r="7" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                id="repo-search-input"
                placeholder="Buscar por palabra clave&hellip;"
                aria-label="Buscar entradas"
              />
            </label>
            <div
              class="chips"
              id="repo-chips"
              role="group"
              aria-label="Filtrar por tema"
            ></div>
          </div>
        </div>
      </section>

      <section class="section" style="padding-top: var(--s3)">
        <div class="container repo-layout">
          <aside aria-label="Filtrar por fecha">
            <div class="repo-timeline" id="repo-timeline"></div>
          </aside>
          <div>
            <p class="repo-results__count" id="repo-count"></p>
            <div id="repo-results"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container site-footer__top">
